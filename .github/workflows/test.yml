name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Feature + universality test
        run: python multi-agent-workflow/tests/test_workflow.py

      - name: A/B baseline-vs-workflow test
        run: python multi-agent-workflow/tests/test_vs_baseline.py

      - name: Upgrade commands test (hooks, board, radar, batch, land, cleanup)
        run: python multi-agent-workflow/tests/test_upgrade.py
