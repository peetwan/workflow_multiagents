name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Feature + universality test
        run: python multi-agent-workflow/tests/test_workflow.py

      - name: A/B baseline-vs-workflow test
        run: python multi-agent-workflow/tests/test_vs_baseline.py

      - name: Upgrade commands test (hooks, board, radar, batch, land, cleanup)
        run: python multi-agent-workflow/tests/test_upgrade.py

      - name: Desktop-app flow test (launch, desktop-config)
        run: python multi-agent-workflow/tests/test_desktop.py

      - name: Readiness flow test (doctor, ready, selftest)
        run: python multi-agent-workflow/tests/test_readiness.py

      - name: MCP server + config test (serve-mcp, mcp-config)
        run: python multi-agent-workflow/tests/test_mcp.py

      - name: MCP stability test (bad repo, garbage, mcp-check, multi-repo)
        run: python multi-agent-workflow/tests/test_mcp_stability.py

      - name: MCP actions + Codex test (dispatch/close from chat, codex write)
        run: python multi-agent-workflow/tests/test_mcp_actions.py

      - name: One-line installer test (install.sh / install.ps1)
        run: python multi-agent-workflow/tests/test_installer.py
